<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Cadastro de Lotes</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Cadastro de Lotes</h1>

<form id="formLote">

<label>Descrição</label><br>
<input type="text" id="descricao" required>

<br><br>

<label>Comprimento (m)</label><br>
<input type="number" id="comprimento" required>

<br><br>

<label>Largura (m)</label><br>
<input type="number" id="largura" required>

<br><br>

<button type="submit">
Cadastrar
</button>

</form>

<hr>

<div id="lista"></div>

<script src="js/script.js"></script>

</body>

</html>
